site_name: Embedded Notes

theme:
  name: material
  highlightjs: true
  features:
    - content.code.copy
    - content.code.annotate

extra_css:
  - styles/extra.css

markdown_extensions:
  - codehilite
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.snippets

nav:
  - Home: index.md
  - STM32:
      - Overview: stm32/index.md
      - GPIO: stm32/gpio.md
  - Arduino:
      - Overview: Arduino/index.md
      - About board: theory-arduino-uno.md

copyright: >
